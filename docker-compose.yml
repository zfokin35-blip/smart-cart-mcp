version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cartdb
      POSTGRES_USER: cart
      POSTGRES_PASSWORD: cart
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  cart_api:
    build:
      context: .
      dockerfile: services/cart_api/Dockerfile
    environment:
      CART_DATABASE_URL: postgresql+psycopg2://cart:cart@postgres:5432/cartdb
      CART_REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]
    ports: ["8001:8001"]

  agent_api:
    build:
      context: .
      dockerfile: services/agent_api/Dockerfile
    environment:
      AGENT_CART_API_URL: http://cart_api:8001

      # DeepSeek
      AGENT_DEEPSEEK_API_KEY: ${AGENT_DEEPSEEK_API_KEY:-}
      AGENT_DEEPSEEK_BASE_URL: ${AGENT_DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      AGENT_DEEPSEEK_MODEL: ${AGENT_DEEPSEEK_MODEL:-deepseek-chat}

      # MCP (ВкусВилл)
      AGENT_MCP_MOCK_ENABLED: ${AGENT_MCP_MOCK_ENABLED:-false}
      AGENT_MCP_SEARCH_URL: ${AGENT_MCP_SEARCH_URL:-https://mcp001.vkusvill.ru/mcp}
      AGENT_MCP_API_KEY: ${AGENT_MCP_API_KEY:-}
      AGENT_MCP_TIMEOUT_SECONDS: ${AGENT_MCP_TIMEOUT_SECONDS:-8}
    depends_on: [cart_api]
    ports: ["8000:8000"]

  telegram_bot:
    build:
      context: .
      dockerfile: services/telegram_bot/Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      BOT_AGENT_API_URL: http://agent_api:8000/api/v1/agent/intent
      BOT_CART_API_URL: http://cart_api:8001/api/v1
    depends_on: [agent_api]
